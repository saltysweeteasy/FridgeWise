<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FridgeWise - Change Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body class="bg-[#f0fff4] font-sans antialiased text-gray-900 overflow-x-hidden">

    <div class="flex flex-col min-h-screen">
        <header class="bg-[#dcfce7] border-b border-green-200 shadow-sm sticky top-0 z-50">
            <nav class="max-w-[1440px] mx-auto px-6 py-3 flex items-center justify-between text-center">
                <div class="w-full">
                    <span class="font-bold text-green-800 text-xl uppercase tracking-tighter">FridgeWise</span>
                </div>
            </nav>
        </header>

        <main class="flex-grow flex items-center justify-center py-12">
            <div id="passwordCard" class="w-full max-w-sm bg-white p-8 rounded-lg shadow-sm border border-gray-200 transition-all">
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-bold text-gray-800 mb-2 uppercase tracking-tight">New Password</h1>
                    <p class="text-sm text-gray-600">Please enter your new security credentials.</p>
                </div>

                <form id="changePasswordForm" class="space-y-6" novalidate>
                    <div>
                        <label class="block text-[10px] font-bold tracking-[0.2em] uppercase text-gray-600 mb-1">Type your new password</label>
                        <input type="password" id="newPassword" required placeholder="••••••••" 
                            class="w-full border border-gray-400 bg-white p-3 outline-none transition-all duration-200 focus:border-green-500">
                        <p id="passwordError" class="text-[10px] text-red-500 font-bold mt-1 hidden uppercase tracking-wider">
                            Password should be more than 6 characters
                        </p>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-green-600 text-white font-bold py-3 uppercase tracking-widest hover:bg-green-700 transition-colors shadow-md">
                        SUBMIT PASSWORD
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script>
        // 1. Initialize Firebase (Same as login.html)
        const firebaseConfig = {
            apiKey: "AIzaSyAZl_HJXjKdycYfYfb4rH7Pue6vwJ9G-KM",
            authDomain: "fridgewise-37166.firebaseapp.com",
            projectId: "fridgewise-37166",
            storageBucket: "fridgewise-37166.firebasestorage.app",
            messagingSenderId: "367251387454",
            appId: "1:367251387454:web:ed536522f271197b3d0d6f"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const form = document.getElementById('changePasswordForm');
        const passwordInput = document.getElementById('newPassword');
        const errorMsg = document.getElementById('passwordError');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newPass = passwordInput.value;

            // Validation Check
            if (newPass.length <= 6) {
                passwordInput.classList.add('border-red-500');
                errorMsg.classList.remove('hidden');
                return;
            }

            submitBtn.innerText = "UPDATING...";
            submitBtn.disabled = true;

            // 2. Firebase Logic: Update Password
            const user = auth.currentUser;

            if (user) {
                // Kung ang user ay kasalukuyang session (naka-log in pa)
                user.updatePassword(newPass).then(() => {
                    window.location.href = "index.html?status=verified";
                }).catch((error) => {
                    console.error(error);
                    alert("Error: " + error.message);
                    submitBtn.innerText = "SUBMIT PASSWORD";
                    submitBtn.disabled = false;
                });
            } else {
                /* Kadalasan sa "Forgot Password" flow, walang 'currentUser'. 
                   Dapat ay gumamit ka ng 'confirmPasswordReset' flow 
                   o i-redirect ang user pabalik sa login para mag-sign in gamit 
                   ang bagong password para ma-set ang session.
                */
                alert("Password updated locally. Please log in with your new password.");
                window.location.href = "login.html";
            }
        });

        // Remove error styling on type
        passwordInput.addEventListener('input', function() {
            if (this.value.length > 6) {
                this.classList.remove('border-red-500');
                errorMsg.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
