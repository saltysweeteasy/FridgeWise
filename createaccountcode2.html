<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FridgeWise - Enter Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body class="bg-[#f0fff4] font-sans">
    <div class="flex flex-col min-h-screen">
        <main class="flex-grow flex items-center justify-center">
            <div class="w-full max-w-sm bg-white p-8 rounded-lg shadow-sm border border-gray-200">
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-bold text-gray-800 mb-2">Enter Verification Code</h1>
                    <p class="text-sm text-gray-600">Check your inbox for the 6-digit code.</p>
                </div>

                <form id="verifyForm" class="space-y-6">
                    <input type="text" id="userInputCode" required maxlength="6" class="w-full border border-gray-400 p-3 text-center tracking-[0.5em] font-bold outline-none focus:border-blue-500">
                    <button type="submit" id="finalBtn" class="w-full bg-[#2b87da] text-white font-bold py-3 uppercase tracking-widest hover:bg-blue-600 shadow-md">
                        VERIFY & CREATE ACCOUNT
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAZl_HJXjKdycYfYfb4rH7Pue6vwJ9G-KM",
            authDomain: "fridgewise-37166.firebaseapp.com",
            projectId: "fridgewise-37166",
            storageBucket: "fridgewise-37166.firebasestorage.app",
            messagingSenderId: "367251387454",
            appId: "1:367251387454:web:ed536522f271197b3d0d6f"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        document.getElementById('verifyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const sentCode = localStorage.getItem('regVerifyCode');
            const userCode = document.getElementById('userInputCode').value.trim();
            const pendingUser = JSON.parse(sessionStorage.getItem('pendingUser'));

            if (userCode === sentCode) {
                document.getElementById('finalBtn').innerText = "CREATING...";
                
                // NOW we actually create the account in Firebase
                auth.createUserWithEmailAndPassword(pendingUser.email, pendingUser.pass)
                    .then((userCredential) => {
                        return db.ref('users/' + userCredential.user.uid).set({
                            username: pendingUser.name,
                            email: pendingUser.email,
                            dob: pendingUser.dob,
                            createdAt: new Date().toISOString()
                        });
                    })
                    .then(() => {
                        localStorage.removeItem('regVerifyCode');
                        sessionStorage.removeItem('pendingUser');
                        window.location.href = "index.html?status=verified";
                    })
                    .catch(err => alert(err.message));
            } else {
                alert("Invalid code. Please try again.");
            }
        });
    </script>
</body>
</html>
