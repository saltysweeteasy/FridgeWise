<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FridgeWise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body class="bg-[#f0fff4] font-sans antialiased text-gray-900 overflow-x-hidden">

    <div class="flex flex-col h-screen">
        <header class="bg-[#dcfce7] border-b border-green-200 shadow-sm sticky top-0 z-50">
            <nav class="max-w-[1440px] mx-auto px-6 py-3 flex items-center justify-between">
                
                <div class="flex items-center">
                    <div id="leftSidebarContainer" class="hidden flex items-center">
                        <button id="sidebarToggle" class="text-gray-600 hover:text-gray-900 focus:outline-none p-2 transition-colors">
                            <svg class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                            </svg>
                        </button>
                        <div class="h-8 border-l border-green-300 mx-4"></div>
                    </div>
                    <span id="brandLogo" class="font-bold text-green-800 text-xl ml-2 uppercase tracking-tighter">FridgeWise</span>
                </div>

                <div class="flex items-center space-x-4">
                    <div class="relative w-72">
                        <input type="text" placeholder="Search" class="w-full bg-white border border-gray-300 rounded-lg pl-4 pr-10 py-1.5 text-sm focus:ring-2 focus:ring-green-400 outline-none">
                        <span class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </span>
                    </div>
                    <button id="userMenuToggle" class="text-gray-700 bg-white hover:bg-gray-50 rounded-full p-1.5 border border-gray-300 shadow-sm">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </button>
                </div>
            </nav>
        </header>

        <main class="flex-grow flex items-center justify-center">
            <div class="text-center p-8">
                <h1 class="text-7xl font-bold mb-4 tracking-tight text-gray-800">FridgeWise</h1>
                <p class="text-xl text-gray-700 font-medium max-w-lg mx-auto">
                    Your reliable companion for any cooking suggestions!
                </p>
                <p class="text-gray-500 mt-2 italic">mwehehehehe</p>
                
                <div id="loginSection" class="mt-12 flex flex-col items-center space-y-4">
                    <a href="login.html" class="inline-block px-16 py-3 bg-white border-2 border-blue-500 text-blue-600 font-bold rounded hover:bg-blue-50 transition-all duration-200 uppercase tracking-wide">
                        LOGIN
                    </a>
                    <p class="text-sm text-gray-600">
                        Don't have an account? 
                        <a href="register.html" class="text-blue-600 font-semibold hover:underline">Try register</a>
                    </p>
                </div>

                <div id="verifiedSection" class="mt-12 hidden">
                    <a href="maindashboard.html" class="inline-block px-20 py-4 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition-all duration-200 uppercase tracking-widest shadow-lg">
                        Start Cooking
                    </a>
                </div>
            </div>
        </main>
    </div>

    <div id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-white shadow-2xl transform -translate-x-full transition-transform duration-300 ease-in-out z-[60]">
        <div class="p-8">
            <div class="flex items-center justify-between mb-10">
                <h2 class="text-2xl font-bold text-green-800">FridgeWise</h2>
                <button id="sidebarClose" class="text-gray-400 hover:text-red-500">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <nav class="space-y-4">
                <a href="index.html" class="flex items-center py-3 px-4 rounded-xl bg-green-50 text-green-900 border-l-4 border-green-600 transition-colors font-semibold">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg> 
                    Home
                </a>

                <a href="maindashboard.html" class="flex items-center py-3 px-4 rounded-xl text-gray-700 hover:bg-green-100 hover:text-green-900 transition-colors font-semibold">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg> 
                    Main Dashboard
                </a>

                <a href="secondarydashboard.html" class="flex items-center py-3 px-4 rounded-xl text-gray-700 hover:bg-green-100 hover:text-green-900 transition-colors font-semibold">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg> 
                    Second Dashboard
                </a>

                <div class="my-4 border-t border-gray-100"></div>

                <a href="cookinghistory.html" class="flex items-center py-3 px-4 rounded-xl text-gray-700 hover:bg-green-100 hover:text-green-900 transition-colors font-semibold">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Cooking History
                </a>
                <a href="favoritemeal.html" class="flex items-center py-3 px-4 rounded-xl text-gray-700 hover:bg-green-100 hover:text-green-900 transition-colors font-semibold">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg> 
                    Favorite Recipes
                </a>
            </nav>
        </div>
    </div>

    <div id="userSidebar" class="fixed inset-y-0 right-0 w-80 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out z-[60] border-l border-gray-100">
        <div class="p-8 flex flex-col h-full">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-xl font-bold text-gray-800">Profile</h2>
                <button id="userSidebarClose" class="text-gray-400 hover:text-red-500">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-green-100 rounded-full mx-auto flex items-center justify-center mb-4">
                    <span id="userInitial" class="text-2xl font-bold text-green-700 uppercase">?</span>
                </div>
                <h3 id="userNameDisplay" class="text-lg font-bold text-gray-900">Loading...</h3>
                <p id="userEmailDisplay" class="text-sm text-gray-500">...</p>
            </div>

            <div class="border-t border-gray-100 my-4"></div>

            <button id="logoutBtn" class="hidden w-full mt-auto bg-red-50 text-red-600 font-bold py-3 rounded-xl hover:bg-red-100 transition-colors flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                </svg>
                LOGOUT
            </button>
        </div>
    </div>

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300 z-50"></div>

    <script>
        // 1. Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAZl_HJXjKdycYfYfb4rH7Pue6vwJ9G-KM",
            authDomain: "fridgewise-37166.firebaseapp.com",
            projectId: "fridgewise-37166",
            storageBucket: "fridgewise-37166.firebasestorage.app",
            messagingSenderId: "367251387454",
            appId: "1:367251387454:web:ed536522f271197b3d0d6f"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // 2. Auth State Monitoring
        auth.onAuthStateChanged((user) => {
            const urlParams = new URLSearchParams(window.location.search);
            const isVerified = urlParams.get('status') === 'verified' || user;

            if (isVerified && user) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('verifiedSection').classList.remove('hidden');
                document.getElementById('leftSidebarContainer').classList.remove('hidden');
                document.getElementById('brandLogo').classList.add('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');

                db.ref('users/' + user.uid).once('value').then((snapshot) => {
                    const data = snapshot.val();
                    const name = (data && data.username) ? data.username : (user.displayName || "User");
                    updateProfileUI(name, user.email);
                });
            } else {
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('verifiedSection').classList.add('hidden');
                document.getElementById('leftSidebarContainer').classList.add('hidden');
                document.getElementById('brandLogo').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.add('hidden');
                
                updateProfileUI("Guest", "Please sign in");
            }
        });

        function updateProfileUI(name, email) {
            document.getElementById('userNameDisplay').textContent = name;
            document.getElementById('userEmailDisplay').textContent = email;
            document.getElementById('userInitial').textContent = name.charAt(0).toUpperCase();
        }

        // 3. Sidebar Mechanics
        const sidebar = document.getElementById('sidebar');
        const userSidebar = document.getElementById('userSidebar');
        const overlay = document.getElementById('sidebarOverlay');

        function closeAll() {
            sidebar.classList.add('-translate-x-full');
            userSidebar.classList.add('translate-x-full');
            overlay.classList.remove('opacity-100', 'pointer-events-auto');
        }

        document.getElementById('sidebarToggle').addEventListener('click', () => {
            sidebar.classList.remove('-translate-x-full');
            overlay.classList.add('opacity-100', 'pointer-events-auto');
        });

        document.getElementById('userMenuToggle').addEventListener('click', () => {
            userSidebar.classList.remove('translate-x-full');
            overlay.classList.add('opacity-100', 'pointer-events-auto');
        });

        [overlay, document.getElementById('sidebarClose'), document.getElementById('userSidebarClose')].forEach(el => {
            el.addEventListener('click', closeAll);
        });

        // 4. Logout Action
        document.getElementById('logoutBtn').addEventListener('click', () => {
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>
