<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Details - FridgeWise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body class="bg-[#f0fff4] font-sans antialiased text-gray-900 overflow-x-hidden">

    <div class="flex flex-col min-h-screen">
        <header class="bg-[#dcfce7] border-b border-green-200 shadow-sm sticky top-0 z-50">
            <nav class="max-w-[1440px] mx-auto px-6 py-3 flex items-center justify-between">
                <div class="flex items-center">
                    <button id="sidebarToggle" class="text-gray-600 hover:text-gray-900 focus:outline-none p-2 transition-colors">
                        <svg class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <div class="h-8 border-l border-green-300 mx-4"></div>
                    <span class="font-bold text-green-800 text-xl ml-2 uppercase tracking-tighter">FridgeWise</span>
                </div>

                <div class="flex items-center space-x-4">
                    <button id="userMenuToggle" class="text-gray-700 bg-white hover:bg-gray-50 rounded-full p-1.5 border border-gray-300 shadow-sm">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </button>
                </div>
            </nav>
        </header>

        <main class="flex-grow flex items-start justify-center py-12 px-6">
            <div class="max-w-2xl w-full bg-white rounded-3xl shadow-xl border border-green-100 overflow-hidden">
                <div class="bg-green-600 p-8 text-white relative overflow-hidden">
                    <div class="relative z-10">
                        <h1 class="text-3xl font-bold italic uppercase tracking-tighter">Account Details</h1>
                        <p class="opacity-90 text-sm">Review and update your FridgeWise profile information.</p>
                    </div>
                    <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-green-500 rounded-full opacity-50"></div>
                </div>

                <div class="p-8 space-y-8">
                    <div class="flex items-center gap-6 p-4 rounded-2xl bg-gray-50 border border-gray-100">
                        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center shadow-inner">
                            <span id="accInitial" class="text-2xl font-bold text-green-700">?</span>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-green-600 uppercase tracking-widest block mb-1">Full Name / Username</label>
                            <p id="accUsername" class="text-xl font-bold text-gray-800">Loading...</p>
                        </div>
                    </div>

                    <div class="space-y-1 px-2">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">Registered Email</label>
                        <div class="flex items-center justify-between border-b border-gray-100 pb-3">
                            <p id="accEmail" class="text-lg font-medium text-gray-700 italic">...</p>
                            <svg class="w-5 h-5 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"></path></svg>
                        </div>
                    </div>

                    <div class="space-y-1 px-2">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">Password</label>
                        <div class="flex items-center justify-between border-b border-gray-100 pb-3">
                            <p class="text-lg text-gray-800 tracking-widest font-mono">••••••••••••</p>
                            <button onclick="togglePasswordModal()" class="text-xs font-bold text-blue-600 hover:bg-blue-50 px-3 py-1.5 rounded-lg transition-all border border-blue-100 uppercase tracking-tighter">
                                Change Password
                            </button>
                        </div>
                    </div>

                    <div class="space-y-1 px-2">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">Date of Birth</label>
                        <div class="border-b border-gray-100 pb-3">
                            <p id="accDob" class="text-lg text-gray-700">...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-white shadow-2xl transform -translate-x-full transition-transform duration-300 ease-in-out z-[60]">
        <div class="p-8">
            <h2 class="text-2xl font-bold text-green-800 mb-8 uppercase tracking-tighter italic">FridgeWise</h2>
            <nav class="space-y-3">
                <a href="maindashboard.html" class="block py-3 px-4 rounded-xl text-gray-600 hover:bg-green-50 hover:text-green-800 font-semibold transition-all">Dashboard</a>
                <a href="accountdetails.html" class="block py-3 px-4 rounded-xl bg-green-50 text-green-900 border-l-4 border-green-600 font-bold">Account Details</a>
                <a href="index.html" class="block py-3 px-4 rounded-xl text-gray-600 hover:bg-green-50 font-semibold transition-all">Logout Home</a>
            </nav>
        </div>
    </div>

    <div id="userSidebar" class="fixed inset-y-0 right-0 w-80 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out z-[60] border-l border-gray-100">
        <div class="p-8 flex flex-col h-full">
            <button id="userSidebarClose" class="self-end text-gray-400 hover:text-red-500 mb-4"><svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            <div class="text-center mb-10">
                <div class="w-20 h-20 bg-green-100 rounded-full mx-auto flex items-center justify-center mb-4 shadow-sm border-2 border-white">
                    <span id="sidebarInitial" class="text-2xl font-bold text-green-700 uppercase">?</span>
                </div>
                <h3 id="sidebarName" class="text-lg font-bold text-gray-900">...</h3>
                <p id="sidebarEmail" class="text-xs text-gray-500">...</p>
            </div>
            <button id="logoutBtn" class="mt-auto w-full bg-red-50 text-red-600 font-bold py-3 rounded-xl hover:bg-red-100 transition-colors uppercase tracking-widest text-sm">Logout</button>
        </div>
    </div>

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300 z-50"></div>

    <div id="passwordModal" class="fixed inset-0 bg-black/60 backdrop-blur-md hidden flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-8 shadow-2xl transform transition-all">
            <h3 class="text-xl font-bold text-gray-800 mb-2 uppercase italic tracking-tighter text-center">Security Update</h3>
            <p class="text-xs text-gray-500 text-center mb-6">Enter a new strong password below.</p>
            <div class="space-y-4">
                <input type="password" id="newPassword" placeholder="New Password" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-4 outline-none focus:ring-2 focus:ring-blue-400 transition-all font-mono text-sm">
                <div class="flex flex-col gap-2">
                    <button onclick="updatePassword()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-200 uppercase tracking-widest text-xs">Confirm Update</button>
                    <button onclick="togglePasswordModal()" class="w-full text-gray-500 font-bold py-3 hover:text-gray-800 uppercase tracking-widest text-[10px]">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIG (Same as yours)
        const firebaseConfig = {
            apiKey: "AIzaSyAZl_HJXjKdycYfYfb4rH7Pue6vwJ9G-KM",
            authDomain: "fridgewise-37166.firebaseapp.com",
            projectId: "fridgewise-37166",
            storageBucket: "fridgewise-37166.firebasestorage.app",
            messagingSenderId: "367251387454",
            appId: "1:367251387454:web:ed536522f271197b3d0d6f"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('accEmail').textContent = user.email;
                document.getElementById('sidebarEmail').textContent = user.email;

                // PATH: users/[UID] (Tugma sa database logic mo)
                db.ref('users/' + user.uid).once('value').then((snapshot) => {
                    const userData = snapshot.val();
                    if (userData) {
                        // Kumukuha ng 'username' field base sa register.html mo
                        const name = userData.username || "User";
                        const dob = userData.dob || "Not set";
                        
                        document.getElementById('accUsername').textContent = name;
                        document.getElementById('accDob').textContent = dob;
                        document.getElementById('sidebarName').textContent = name;
                        
                        const initial = name.charAt(0).toUpperCase();
                        document.getElementById('accInitial').textContent = initial;
                        document.getElementById('sidebarInitial').textContent = initial;
                    }
                });
            } else {
                window.location.href = 'login.html';
            }
        });

        function togglePasswordModal() {
            document.getElementById('passwordModal').classList.toggle('hidden');
        }

        function updatePassword() {
            const user = auth.currentUser;
            const newPwd = document.getElementById('newPassword').value;
            if (newPwd.length < 6) return alert("Password must be at least 6 characters.");

            user.updatePassword(newPwd).then(() => {
                alert("Password updated successfully!");
                togglePasswordModal();
                document.getElementById('newPassword').value = "";
            }).catch(e => alert("Please log out and log in again before changing password for security verification."));
        }

        // SIDEBAR CONTROLS
        const sidebar = document.getElementById('sidebar');
        const userSidebar = document.getElementById('userSidebar');
        const overlay = document.getElementById('sidebarOverlay');

        function closeAll() {
            sidebar.classList.add('-translate-x-full');
            userSidebar.classList.add('translate-x-full');
            overlay.classList.remove('opacity-100', 'pointer-events-auto');
        }

        document.getElementById('sidebarToggle').onclick = () => { sidebar.classList.remove('-translate-x-full'); overlay.classList.add('opacity-100', 'pointer-events-auto'); };
        document.getElementById('userMenuToggle').onclick = () => { userSidebar.classList.remove('translate-x-full'); overlay.classList.add('opacity-100', 'pointer-events-auto'); };
        [overlay, document.getElementById('userSidebarClose')].forEach(el => el.onclick = closeAll);
        document.getElementById('logoutBtn').onclick = () => auth.signOut().then(() => window.location.href = 'index.html');
    </script>
</body>
</html>
